spring:
  application:
    name: client
  datasource:
    url: jdbc:h2:mem:testdb # banco em memória
    driver-class-name: org.h2.Driver
    username: sa
    password: # sem senha por padrão

  h2:
    console:
      enabled: true # habilita o console web
      path: /h2-console # acesse em http://localhost:8080/h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop # cria o schema ao iniciar, apaga ao encerrar
    show-sql: true # exibe SQL no console
    properties:
      hibernate:
        format_sql: true # SQL formatado e legível